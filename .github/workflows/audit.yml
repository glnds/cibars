name: Security Audit

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 6am UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
